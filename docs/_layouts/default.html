<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <meta
      property="og:title"
      content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}"
    />
    <meta
      property="og:description"
      content="{{ page.description | default: site.description }}"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:image" content="https://docs.rerange.xyz/preview.png" />
    <meta property="og:image:alt" content="Rerange Docs" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}"
    />
    <meta
      name="twitter:description"
      content="{{ page.description | default: site.description }}"
    />
    <meta name="twitter:image" content="https://docs.rerange.xyz/preview.png" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <link
      rel="stylesheet"
      href="{{ '/assets/css/style.css' | relative_url }}"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{ '/favicon.ico' | relative_url }}"
    />
  </head>
  <body>
    <header class="site-header">
      <a
        class="brand"
        href="{{ '/' | relative_url }}"
        aria-label="Rerange docs home"
      >
        <span class="brand-mark">♻️</span>
        <span>RΞRANGE</span>
        <sub class="brand-sup">docs</sub>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        {% for item in site.nav %}
        <!-- prettier-ignore -->
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>
          {{ item.title }}
        </a>
        {% endfor %}
      </nav>
    </header>

    <main class="page">{{ content }}</main>

    <footer class="site-footer">
      <span>
        Non-custodial liquid orders for concentrated liquidity:
        <a target="_blank" href="https://rerange.xyz">rerange.xyz</a>
      </span>
      <span class="footer-links">
        <a href="{{ '/llms.txt' | relative_url }}">llms.txt</a>
        <a href="https://github.com/rerange-xyz/info">v1.0.2</a>
      </span>
    </footer>
  </body>
</html>
